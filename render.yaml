services:
  - type: web
    name: mission-control
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AUTH_USER
        value: admin
      - key: AUTH_PASS
        generateValue: true
      - key: API_KEY
        generateValue: true
